name: Deploy Production On Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  migrate_database:
    name: Migrate Supabase DB (Alembic)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate required secrets (DB)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_DIRECT_URL: ${{ secrets.DATABASE_DIRECT_URL }}
        run: |
          test -n "$DATABASE_URL" || (echo "Missing GitHub secret: DATABASE_URL" && exit 1)
          if [ -z "$DATABASE_DIRECT_URL" ]; then
            echo "Warning: DATABASE_DIRECT_URL is not set; Alembic will fall back to DATABASE_URL."
            echo "For Supabase production migrations, set DATABASE_DIRECT_URL to the direct Postgres connection string to avoid pooler limits."
          fi

      - name: Install migration dependencies
        run: |
          python -m pip install --upgrade pip
          pip install alembic==1.13.0 sqlalchemy==2.0.35 psycopg2-binary==2.9.9 pydantic==2.9.0 pydantic-settings==2.5.0 python-dotenv==1.0.1

      - name: Run Alembic migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_DIRECT_URL: ${{ secrets.DATABASE_DIRECT_URL }}
        run: |
          if [ -n "$DATABASE_DIRECT_URL" ]; then
            export ALEMBIC_DATABASE_URL="$DATABASE_DIRECT_URL"
            echo "Using DATABASE_DIRECT_URL for Alembic migrations."
          else
            export ALEMBIC_DATABASE_URL="$DATABASE_URL"
            echo "Using DATABASE_URL for Alembic migrations."
          fi
          alembic upgrade heads
