name: Deploy Production On Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  migrate_database:
    name: Migrate Supabase DB (Alembic)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate required secrets (DB)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          test -n "$DATABASE_URL" || (echo "Missing GitHub secret: DATABASE_URL" && exit 1)

      - name: Install migration dependencies
        run: |
          python -m pip install --upgrade pip
          pip install alembic==1.13.0 sqlalchemy==2.0.35 psycopg2-binary==2.9.9 pydantic==2.9.0 pydantic-settings==2.5.0 python-dotenv==1.0.1

      - name: Run Alembic migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: alembic upgrade head
