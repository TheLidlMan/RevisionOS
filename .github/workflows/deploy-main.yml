name: Deploy Production On Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  migrate_database:
    name: Migrate Supabase DB (Alembic)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate required secrets (DB)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          test -n "$DATABASE_URL" || (echo "Missing GitHub secret: DATABASE_URL" && exit 1)

      - name: Install migration dependencies
        run: |
          python -m pip install --upgrade pip
          pip install alembic==1.13.0 sqlalchemy==2.0.35 psycopg2-binary==2.9.9 pydantic==2.9.0 pydantic-settings==2.5.0 python-dotenv==1.0.1

      - name: Run Alembic migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: alembic upgrade head

  deploy_frontend:
    name: Deploy Frontend To Cloudflare Pages
    runs-on: ubuntu-latest
    needs: migrate_database
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate required secrets (Cloudflare)
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          test -n "$VITE_API_BASE_URL" || (echo "Missing GitHub secret: VITE_API_BASE_URL" && exit 1)
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing GitHub secret: CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing GitHub secret: CLOUDFLARE_ACCOUNT_ID" && exit 1)
          test -n "$CLOUDFLARE_PAGES_PROJECT" || (echo "Missing GitHub secret: CLOUDFLARE_PAGES_PROJECT" && exit 1)

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name ${{ secrets.CLOUDFLARE_PAGES_PROJECT }} --branch main
